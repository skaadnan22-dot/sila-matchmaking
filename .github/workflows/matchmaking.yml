name: Sila Matchmaking Ritual

on:
  schedule:
    - cron: '30 12 * * 5'
  workflow_dispatch:

jobs:
  matchmaking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run matchmaking
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node matchmaking.js
